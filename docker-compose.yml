services:
  postgres:
    image: postgres:16-alpine
    container_name: poketeam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: poketeam
      POSTGRES_USER: poketeam
      POSTGRES_PASSWORD: poketeam
    ports:
      - "5432:5432"
    volumes:
      - poketeam-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poketeam -d poketeam"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: poketeam-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://poketeam:poketeam@postgres:5432/poketeam?schema=public
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:3000/api/integrations/google-drive/oauth/callback}
      GOOGLE_CREDENTIAL_ENCRYPTION_KEY: ${GOOGLE_CREDENTIAL_ENCRYPTION_KEY:-}
      GOOGLE_DRIVE_SCOPES: ${GOOGLE_DRIVE_SCOPES:-https://www.googleapis.com/auth/drive.readonly,https://www.googleapis.com/auth/drive.metadata.readonly}
      GOOGLE_DRIVE_MAX_EXTRACT_BYTES: ${GOOGLE_DRIVE_MAX_EXTRACT_BYTES:-5242880}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://api:3000/api
    container_name: poketeam-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_URL: http://api:3000/api
    ports:
      - "3001:3001"

volumes:
  poketeam-postgres-data:
