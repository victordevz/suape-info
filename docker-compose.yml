services:
  postgres:
    image: postgres:16-alpine
    container_name: poketeam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: poketeam
      POSTGRES_USER: poketeam
      POSTGRES_PASSWORD: poketeam
    ports:
      - "5432:5432"
    volumes:
      - poketeam-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poketeam -d poketeam"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  poketeam-postgres-data:
